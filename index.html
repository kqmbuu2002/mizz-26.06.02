<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踩雷達人佑青哥｜活動已結束</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1A1510;
    --gold: #C9A84C;
    --rust: #B85C38;
    --muted: #6B6460;
    --border: #DDD8D0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .icon {
    width: 72px;
    height: 72px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 32px;
  }
  .badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 8px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 24px auto;
  }
  .line-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #06C755;
    color: #fff;
    text-decoration: none;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="badge">Mizz 美滋滋</div>
  <div class="icon">🔒</div>
  <h1>此次活動已結束</h1>
  <p>感謝所有參與私群限定預購的朋友</p>
  <p>下次活動消息請關注官方 Line</p>
  <div class="divider"></div>
  <p>有任何問題歡迎直接聯繫</p>
  <a href="https://mizz.tw/line/oc" target="_blank" class="line-btn">
    💬 私訊 Mizz美滋滋 官方 Line
  </a>
</body>
</html>
